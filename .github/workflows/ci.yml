name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build API
        run: dotnet build src/OrderManagement.Api/OrderManagement.Api.csproj -c Release
      - name: Build Web
        run: |
          cd src/order-management-web
          npm ci
          npm run build
