name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/order-management-web/package-lock.json
      - name: Build API
        run: dotnet build src/OrderManagement.Api/OrderManagement.Api.csproj -c Release
      - name: Install Web dependencies
        working-directory: src/order-management-web
        run: npm ci
      - name: Build Web
        working-directory: src/order-management-web
        run: npm run build
